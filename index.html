<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1877f2, #42b72a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .box {
            background: white;
            padding: 40px 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 380px;
            width: 90%;
        }
        .btn {
            background: #1877f2;
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 17px;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>🔐 Facebook Login</h2>
        <p>Login karein apne Facebook account se</p>
        <button class="btn" onclick="doLogin()">Login with Facebook</button>
    </div>

    <script>
        var APP_ID = "993244446423693";
        var REDIRECT = "https://zunii66.github.io/zubii2/dashboard.html";

        function doLogin() {
            var url = "https://www.facebook.com/v21.0/dialog/oauth" +
                "?client_id=" + APP_ID +
                "&redirect_uri=" + encodeURIComponent(REDIRECT) +
                "&response_type=token" +
                "&scope=public_profile,email" +
                "&state=test123";
            
            window.location.href = url;
        }
    </script>

</body>
</html>
