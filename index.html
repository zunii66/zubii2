<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB Login - WebView</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1877f2, #42b72a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
        }
        .box h2 { margin-bottom: 5px; color: #333; font-size: 18px; }
        .box p { color: #666; font-size: 12px; margin-bottom: 15px; }
        .btn {
            background: #1877f2;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
        }
        .btn-green { background: #42b72a; }
        .btn-orange { background: #f7a01b; }
        .btn-purple { background: #8e44ad; }
        .btn-red { background: #e74c3c; }
        .btn-teal { background: #009688; }
        .btn-pink { background: #e91e63; }
        .btn-dark { background: #333; }
        .status {
            background: #fff9c4;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 12px;
            display: none;
            word-break: break-all;
        }
        .hidden-link {
            display: none;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>🔐 FB Login (WebView)</h2>
        <p>Koi bhi method try karein</p>
        
        <!-- Method 1: Window Open (New Browser Window) -->
        <button class="btn" onclick="method1_WindowOpen()">
            📱 Method 1: Open in New Window
        </button>
        
        <!-- Method 2: Same Tab Redirect with Detection -->
        <button class="btn btn-green" onclick="method2_SameTab()">
            🔄 Method 2: Same Tab Redirect
        </button>
        
        <!-- Method 3: Anchor Tag Click -->
        <button class="btn btn-orange" onclick="method3_AnchorClick()">
            🔗 Method 3: Direct Link Click
        </button>
        
        <!-- Method 4: Form POST Submit -->
        <button class="btn btn-purple" onclick="method4_FormSubmit()">
            📤 Method 4: Form Submit
        </button>
        
        <!-- Method 5: Replace Location -->
        <button class="btn btn-red" onclick="method5_Replace()">
            🔀 Method 5: Replace Location
        </button>
        
        <!-- Method 6: Push Notification Style -->
        <button class="btn btn-teal" onclick="method6_PushNotify()">
            🔔 Method 6: Push Notification Style
        </button>
        
        <!-- Method 7: Check & Continue -->
        <button class="btn btn-pink" onclick="method7_AutoDetect()">
            🔍 Method 7: Auto Detect Session
        </button>
        
        <!-- Method 8: Manual URL Copy -->
        <button class="btn btn-dark" onclick="method8_ManualURL()">
            📋 Method 8: Copy URL & Open
        </button>
        
        <div class="status" id="status"></div>
    </div>

    <!-- Hidden anchor for method 3 -->
    <a id="hiddenAnchor" class="hidden-link" href="#" target="_blank"></a>
    
    <!-- Hidden form for method 4 -->
    <form id="hiddenForm" method="GET" action="" target="_self" style="display:none;"></form>

    <!-- Hidden iframe for notification -->
    <iframe id="notifyFrame" style="display:none; position:fixed; bottom:10px; right:10px; width:300px; height:100px; border:2px solid #1877f2; border-radius:10px; background:white; z-index:9999; box-shadow:0 5px 20px rgba(0,0,0,0.3);"></iframe>

    <script>
        // ============ CONFIG ============
        var APP_ID = "993244446423693";
        var REDIRECT = "https://zunii66.github.io/zubii2/dashboard.html";
        var SCOPE = "public_profile,email";
        var LOGIN_URL = "https://www.facebook.com/v21.0/dialog/oauth" +
            "?client_id=" + APP_ID +
            "&redirect_uri=" + encodeURIComponent(REDIRECT) +
            "&response_type=token" +
            "&scope=" + SCOPE +
            "&display=page";

        function showStatus(msg) {
            var s = document.getElementById('status');
            s.style.display = 'block';
            s.innerText = msg;
        }

        // ============ METHOD 1: New Window (Browser's Own) ============
        function method1_WindowOpen() {
            showStatus("Opening Facebook in new window...");
            
            // Mobile WebView mein window.open kaam karega
            var w = window.open(LOGIN_URL, '_blank', 'location=yes,scrollbars=yes,status=yes');
            
            if (!w) {
                showStatus("⚠️ Popup blocked! Trying fallback...");
                window.location.href = LOGIN_URL;
            } else {
                showStatus("✅ New window opened. Login karo, phir close hone par dashboard check karo.");
                
                // Check if window closed
                var timer = setInterval(function() {
                    if (w.closed) {
                        clearInterval(timer);
                        showStatus("Window closed! Checking session...");
                        checkAndRedirect();
                    }
                    try {
                        var wUrl = w.location.href;
                        if (wUrl.indexOf('access_token') > -1 || wUrl.indexOf('dashboard') > -1) {
                            clearInterval(timer);
                            w.close();
                            if (wUrl.indexOf('access_token') > -1) {
                                window.location.href = REDIRECT + wUrl.substring(wUrl.indexOf('#'));
                            } else {
                                window.location.href = REDIRECT;
                            }
                        }
                    } catch(e) {
                        // Cross-origin, can't read - normal
                    }
                }, 1000);
            }
        }

        // ============ METHOD 2: Same Tab with State Check ============
        function method2_SameTab() {
            showStatus("Redirecting to Facebook...");
            
            // Save state
            sessionStorage.setItem('login_started', 'true');
            sessionStorage.setItem('login_method', 'same_tab');
            sessionStorage.setItem('login_time', Date.now());
            
            window.location.href = LOGIN_URL;
        }

        // ============ METHOD 3: Hidden Anchor Click ============
        function method3_AnchorClick() {
            showStatus("Opening via link click...");
            
            var anchor = document.getElementById('hiddenAnchor');
            anchor.href = LOGIN_URL;
            anchor.target = '_blank';
            anchor.click();
            
            setTimeout(function() {
                showStatus("Link clicked! If nothing happens, try Method 1");
            }, 1000);
        }

        // ============ METHOD 4: Form Submit ============
        function method4_FormSubmit() {
            showStatus("Submitting login form...");
            
            var form = document.getElementById('hiddenForm');
            form.action = "https://www.facebook.com/v21.0/dialog/oauth";
            form.target = '_self';
            
            // Clear existing inputs
            form.innerHTML = '';
            
            // Add hidden inputs
            var inputs = {
                'client_id': APP_ID,
                'redirect_uri': REDIRECT,
                'response_type': 'token',
                'scope': SCOPE,
                'display': 'page',
                'state': 'form_' + Date.now()
            };
            
            for (var key in inputs) {
                var input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = inputs[key];
                form.appendChild(input);
            }
            
            sessionStorage.setItem('login_started', 'true');
            form.submit();
        }

        // ============ METHOD 5: Location Replace ============
        function method5_Replace() {
            showStatus("Replacing current page...");
            
            sessionStorage.setItem('login_started', 'true');
            sessionStorage.setItem('login_method', 'replace');
            
            var url = LOGIN_URL + "&state=replace_" + Date.now();
            window.location.replace(url);
        }

        // ============ METHOD 6: Push Notification Style ============
        function method6_PushNotify() {
            showStatus("Setting up notification...");
            
            // Save state
            sessionStorage.setItem('login_started', 'true');
            sessionStorage.setItem('login_method', 'push');
            
            // Create a small "notification" at bottom
            var iframe = document.getElementById('notifyFrame');
            iframe.style.display = 'block';
            iframe.src = LOGIN_URL + "&display=touch";
            
            // Poll for completion
            var pollTimer = setInterval(function() {
                // Check if token exists in main window
                if (window.location.hash.indexOf('access_token') > -1) {
                    clearInterval(pollTimer);
                    iframe.style.display = 'none';
                    window.location.href = REDIRECT + window.location.hash;
                }
                
                // Check session
                var user = sessionStorage.getItem('fb_user');
                if (user) {
                    clearInterval(pollTimer);
                    iframe.style.display = 'none';
                    window.location.href = REDIRECT;
                }
            }, 2000);
            
            showStatus("📱 Login in notification window. Complete karo, auto-redirect hoga!");
            
            // Auto close iframe after 60 seconds
            setTimeout(function() {
                clearInterval(pollTimer);
                iframe.style.display = 'none';
                checkAndRedirect();
            }, 60000);
        }

        // ============ METHOD 7: Auto Detect & Continue ============
        function method7_AutoDetect() {
            showStatus("Checking all possible sessions...");
            
            // Check 1: URL hash
            if (window.location.hash.indexOf('access_token') > -1) {
                showStatus("✅ Token in URL! Redirecting...");
                window.location.href = REDIRECT + window.location.hash;
                return;
            }
            
            // Check 2: Session storage
            var sessionUser = sessionStorage.getItem('fb_user');
            if (sessionUser) {
                showStatus("✅ Session found! Redirecting...");
                window.location.href = REDIRECT;
                return;
            }
            
            // Check 3: Local storage
            var localUser = localStorage.getItem('fb_user');
            if (localUser) {
                showStatus("✅ Local session found! Redirecting...");
                sessionStorage.setItem('fb_user', localUser);
                window.location.href = REDIRECT;
                return;
            }
            
            // Check 4: Facebook cookies (c_user)
            var cookies = document.cookie;
            if (cookies.indexOf('c_user') > -1) {
                showStatus("✅ Facebook logged in! Use Method 1 to connect.");
            } else {
                showStatus("❌ No session found. Use Method 1 or 4.");
            }
        }

        // ============ METHOD 8: Manual URL Copy ============
        function method8_ManualURL() {
            var url = LOGIN_URL;
            
            // Try to copy to clipboard
            if (navigator.clipboard) {
                navigator.clipboard.writeText(url).then(function() {
                    showStatus("📋 URL copied! Paste in browser: " + url.substring(0, 50) + "...");
                }).catch(function() {
                    showStatus("📋 URL: " + url);
                });
            } else {
                // Show URL in prompt for manual copy
                showStatus("📋 Copy this URL:\n\n" + url);
                prompt("Copy this URL and open in browser:", url);
            }
            
            // Also open in new window
            setTimeout(function() {
                window.open(url, '_blank');
            }, 500);
        }

        // ============ HELPER: Check and Redirect ============
        function checkAndRedirect() {
            var user = sessionStorage.getItem('fb_user');
            if (user) {
                window.location.href = REDIRECT;
            } else {
                // Check URL
                if (window.location.hash.indexOf('access_token') > -1) {
                    window.location.href = REDIRECT + window.location.hash;
                } else {
                    showStatus("Login complete hone par dashboard auto-load hoga. Ya Method 7 try karo.");
                }
            }
        }

        // ============ AUTO CHECK ON LOAD ============
        function autoCheckOnLoad() {
            console.log("Page loaded, checking state...");
            
            // Check if coming back from Facebook
            if (window.location.hash.indexOf('access_token') > -1) {
                console.log("Token found on load!");
                showStatus("✅ Login successful! Redirecting...");
                setTimeout(function() {
                    window.location.href = REDIRECT + window.location.hash;
                }, 500);
                return;
            }
            
            // Check if login was started
            var loginStarted = sessionStorage.getItem('login_started');
            if (loginStarted === 'true') {
                console.log("Login was started, checking result...");
                sessionStorage.removeItem('login_started');
                checkAndRedirect();
                return;
            }
            
            // Check existing session
            var user = sessionStorage.getItem('fb_user');
            if (user) {
                console.log("Existing session found!");
                showStatus("👋 Welcome back! Redirecting...");
                setTimeout(function() {
                    window.location.href = REDIRECT;
                }, 300);
                return;
            }
            
            console.log("No session. Showing login options.");
        }

        // Run auto check
        autoCheckOnLoad();
        
        console.log("✅ FB Login Page Ready");
        console.log("App ID:", APP_ID);
        console.log("Methods: 8 available");
    </script>

</body>
</html>
